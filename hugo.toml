baseURL = "https://hugo-u39205.vm.elestio.app"
title = "AI対応高機能サイト構築サービス - 株式会社インターワーク"
theme = "hugo-universal-theme"
languageCode = "ja"
defaultContentLanguage = "ja"
summaryLength = 70

[services]
    [services.disqus]
        shortname = ""
    [services.googleAnalytics]
        id = ""

[params]
    viewMorePostLink = "/blog/"
    author = "株式会社インターワーク"
    defaultKeywords = ["AI", "ウェブサイト", "サイト構築"]
    defaultDescription = "AI対応高機能サイト構築サービス"
    
    date_format = "January 2, 2006"
    style = "default"
    disabled_logo = false
    logo_text = "インターワーク"
    logo = "images/logo.png"
    logo_small = "images/logo.png"
    
    about_us = "<p>AI技術を活用したサイト構築サービス</p>"
    copyright = "Copyright (c) 2025, 株式会社インターワーク"

    [params.carouselHomepage]
        enable = true
        auto_play = true
        slide_speed = 2000

    [params.features]
        enable = true
        cols = 3

    [params.recent_posts]
        enable = true

[[menu.main]]
    name = "ホーム"
    url = "/"
    weight = 1

[[menu.main]]
    name = "ブログ"
    url = "/blog/"
    weight = 2

[[menu.main]]
    name = "お問い合わせ"
    url = "/contact/"
    weight = 3

[[menu.main]]
    name = "サポート"
    url = "/faq/"
    weight = 4
